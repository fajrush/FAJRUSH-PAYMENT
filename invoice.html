<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Pembayaran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-950 text-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-gray-900 border border-gray-800 p-6 rounded-2xl shadow-2xl text-center">
        <div class="text-amber-500 bg-amber-500/10 border border-amber-500/20 w-fit px-4 py-1 rounded-full text-xs font-semibold mx-auto mb-4 animate-pulse">
            <i class="fa-solid fa-clock mr-1"></i> Menunggu Pembayaran
        </div>

        <h2 id="inv-title" class="text-lg font-bold text-white mb-1">INV-XXXX</h2>
        <p class="text-xs text-gray-400 mb-6">Silakan transfer sesuai detail di bawah ini</p>

        <div class="bg-gray-950 border border-gray-800 rounded-xl p-4 text-left space-y-3 mb-6 font-mono text-sm">
            <div class="flex justify-between border-b border-gray-800 pb-2">
                <span class="text-gray-500">Metode:</span>
                <span id="detail-method" class="text-white font-bold">-</span>
            </div>
            <div class="flex justify-between border-b border-gray-800 pb-2">
                <span class="text-gray-500">Nomor Tujuan:</span>
                <span id="detail-account" class="text-indigo-400 font-bold tracking-wider">-</span>
            </div>
            <div class="flex justify-between border-b border-gray-800 pb-2">
                <span class="text-gray-500">Atas Nama:</span>
                <span id="detail-name" class="text-white">-</span>
            </div>
            <div class="flex justify-between pt-1">
                <span class="text-gray-500">Total Transfer:</span>
                <span id="detail-amount" class="text-emerald-400 font-bold text-base">-</span>
            </div>
        </div>

        <p class="text-xs text-gray-500"><i class="fa-solid fa-rotate animate-spin mr-1"></i> Jangan tutup halaman ini, sistem akan mendeteksi otomatis dan mengalihkan Anda jika dana sudah masuk.</p>
    </div>

    <script>
        const SUPABASE_URL = "https://XYZ.supabase.co"; 
        const SUPABASE_KEY = "TOKEN_ANON_KEY_KAMU";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const invoiceId = urlParams.get('id');
        document.getElementById('inv-title').innerText = invoiceId;

        document.addEventListener('DOMContentLoaded', initInvoice);

        async function initInvoice() {
            // 1. Ambil data transaksi
            const { data: tx } = await _supabase.from('transactions').select('*').eq('id', invoiceId).single();
            if(!tx) return alert('Invoice salah!');

            // 2. Ambil detail instruksi bayar dari settingan admin
            const { data: method } = await _supabase.from('payment_methods').select('*').eq('id', tx.method).single();
            
            document.getElementById('detail-method').innerText = method.name;
            document.getElementById('detail-account').innerText = method.account_number;
            document.getElementById('detail-name').innerText = method.account_name;
            document.getElementById('detail-amount').innerText = "Rp " + tx.amount.toLocaleString('id-ID');

            // 3. Polling Realtime cek status lunas
            const interval = setInterval(async () => {
                const { data: currentTx } = await _supabase.from('transactions').select('status').eq('id', invoiceId).single();
                
                if(currentTx && currentTx.status === 'PAID') {
                    clearInterval(interval);
                    
                    // Ambil info sosmed admin buat pengalihan
                    const { data: sosmed } = await _supabase.from('admin_socials').select('*').eq('id', 1).single();
                    alert('Pembayaran Sukses! Kamu akan dialihkan ke Sosial Media Admin.');

                    if (sosmed.active_platform === 'whatsapp') {
                        window.location.href = `https://wa.me/${sosmed.whatsapp_number}?text=Halo%20Admin,%20saya%20sudah%20transfer%20untuk%20${invoiceId}`;
                    } else {
                        window.location.href = `https://t.me/${sosmed.telegram_username}`;
                    }
                }
            }, 3000);
        }
    </script>
</body>
</html>
