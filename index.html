<div id="detail-box" class="hidden bg-slate-900/80 border border-slate-800 rounded-2xl p-5 text-center animate-fade-in">
            <h3 id="method-title" class="font-bold text-lg mb-3 tracking-wide text-indigo-300"></h3>
            
            <div id="qris-area" class="hidden flex flex-col items-center justify-center">
                <img id="qris-img" src="https://placehold.co/200x200/png?text=QRIS+Active" alt="QRIS" class="w-48 h-48 rounded-xl border-4 border-white mb-3">
                <p class="text-xs text-slate-400 mb-4">Scan QRIS di atas untuk menyelesaikan pembayaran</p>
            </div>

            <div id="transfer-area" class="hidden flex flex-col items-center justify-center mb-4">
                <p class="text-xs text-slate-400 mb-1">Nomor Tujuan / No. Rekening:</p>
                <div class="flex items-center gap-2 bg-slate-800 px-4 py-2 rounded-xl border border-slate-700 w-full justify-between">
                    <span id="target-number" class="font-mono font-bold tracking-wider text-base text-white"></span>
                    <button onclick="copyNumber()" class="text-indigo-400 hover:text-indigo-300 p-1"><i class="far fa-copy"></i></button>
                </div>
            </div>

            <div class="border-t border-slate-800 pt-4 mt-2">
                <p class="text-xs text-slate-400 mb-3">Sudah Transfer? Konfirmasi otomatis ke Admin:</p>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="sendConfirmation('whatsapp')" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-2.5 px-4 rounded-xl text-xs transition flex items-center justify-center gap-2 shadow-lg shadow-emerald-600/10">
                        <i class="fab fa-whatsapp text-sm"></i> WhatsApp
                    </button>
                    <button onclick="sendConfirmation('telegram')" class="bg-sky-600 hover:bg-sky-500 text-white font-bold py-2.5 px-4 rounded-xl text-xs transition flex items-center justify-center gap-2 shadow-lg shadow-sky-600/10">
                        <i class="fab fa-telegram-plane text-sm"></i> Telegram
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data Default Kontak Admin
        const adminContact = {
            whatsapp: "6281234567890", // PENTING: Gunakan format 62, jangan pakai 08
            telegram: "username_admin_kamu" // Isi dengan username Telegram tanpa tanda @
        };

        const defaultData = {
            qris: "https://placehold.co/200x200/png?text=QRIS+Z",
            dana: "0812-3456-7890",
            gopay: "0812-3456-7890",
            seabank: "9012-3456-789"
        };

        let currentMethod = "";

        function getPaymentData() {
            return {
                qris: localStorage.getItem('qris_url') || defaultData.qris,
                dana: localStorage.getItem('dana_num') || defaultData.dana,
                gopay: localStorage.getItem('gopay_num') || defaultData.gopay,
                seabank: localStorage.getItem('seabank_num') || defaultData.seabank
            }
        }

        function selectMethod(method) {
            currentMethod = method;
            const data = getPaymentData();
            const detailBox = document.getElementById('detail-box');
            const title = document.getElementById('method-title');
            const qrisArea = document.getElementById('qris-area');
            const transferArea = document.getElementById('transfer-area');
            
            detailBox.classList.remove('hidden');
            title.textContent = method.toUpperCase();

            if (method === 'qris') {
                qrisArea.classList.remove('hidden');
                transferArea.classList.add('hidden');
                document.getElementById('qris-img').src = data.qris;
            } else {
                qrisArea.classList.add('hidden');
                transferArea.classList.remove('hidden');
                document.getElementById('target-number').textContent = data[method];
            }
        }

        function copyNumber() {
            const num = document.getElementById('target-number').textContent;
            navigator.clipboard.writeText(num);
            alert('Nomor berhasil disalin! ✨');
        }

        // FUNGSI KIRIM CHAT OTOMATIS DENGAN REAL TIME & DATE
        function sendConfirmation(platform) {
            // Generate Waktu & Tanggal Real-time saat tombol diklik
            const sekarang = new Date();
            
            const infoTanggal = sekarang.toLocaleDateString('id-ID', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
            
            const infoWaktu = sekarang.toLocaleTimeString('id-ID', { 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit'
            }) + " WIB";

            // Membuat ID Transaksi Acak agar terlihat profesional
            const trxId = "TRX-" + Math.floor(100000 + Math.random() * 900000);

            // Format Teks yang akan dikirim
            const teksFormat = 
`HALO ADMIN, SAYA SUDAH TRANSFER ✨

📝 RINCIAN TRANSAKSI:
----------------------------------
🆔 ID Transaksi : ${trxId}
💳 Metode      : ${currentMethod.toUpperCase()}
📅 Tanggal     : ${infoTanggal}
⏰ Waktu       : ${infoWaktu}
🟢 Status      : BERHASIL/SUKSES
----------------------------------

*Bukti transfer/screenshot saya lampirkan di bawah ini ya min.*`;

            // Encode teks agar aman dibaca oleh URL link
            const teksEncoded = encodeURIComponent(teksFormat);

            if (platform === 'whatsapp') {
                const urlWa = `https://api.whatsapp.com/send?phone=${adminContact.whatsapp}&text=${teksEncoded}`;
                window.open(urlWa, '_blank');
            } else if (platform === 'telegram') {
                const urlTg = `https://t.me/${adminContact.telegram}?text=${teksEncoded}`;
                // Catatan: Telegram via web link text kadang langsung masuk jika didukung aplikasi desktop/mobile kamu
                window.open(urlTg, '_blank');
            }
        }
    </script>
