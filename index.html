<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout Pembayaran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-950 text-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-gray-900 border border-gray-800 p-6 rounded-2xl shadow-2xl">
        <h2 class="text-xl font-bold mb-1 text-white text-center">Form Pembayaran otomatis</h2>
        <p class="text-gray-400 text-xs text-center mb-6">Silakan isi data dan pilih metode pembayaran</p>

        <form id="checkout-form" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1">Nomor WhatsApp Kamu</label>
                <input type="number" id="user-phone" placeholder="Contoh: 081234567xxx" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500 font-mono text-sm" required>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1">Nominal Transfer (Rp)</label>
                <input type="number" id="pay-amount" placeholder="Masukkan jumlah uang" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-indigo-500 font-mono text-sm" required>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-2">Pilih Metode Pembayaran</label>
                <div id="loading-methods" class="text-xs text-indigo-400"><i class="fa-solid fa-spinner animate-spin"></i> Memuat metode pembayaran...</div>
                <div id="methods-container" class="grid grid-cols-2 gap-3">
                    </div>
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl font-semibold tracking-wide transition shadow-lg shadow-indigo-600/20 mt-2">
                Bayar Sekarang <i class="fa-solid fa-arrow-right ml-1 text-xs"></i>
            </button>
        </form>
    </div>

    <script>
        // MASUKKAN URL & KEY SUPABASE KAMU DI SINI
        const SUPABASE_URL = "https://XYZ.supabase.co"; 
        const SUPABASE_KEY = "TOKEN_ANON_KEY_KAMU";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let selectedMethod = '';

        document.addEventListener('DOMContentLoaded', loadMethods);

        async function loadMethods() {
            const { data, error } = await _supabase.from('payment_methods').select('*').eq('is_active', true);
            document.getElementById('loading-methods').classList.add('hidden');
            const container = document.getElementById('methods-container');
            container.innerHTML = '';

            if (data) {
                data.forEach(m => {
                    container.innerHTML += `
                        <div onclick="selectMethod('${m.id}')" id="card-${m.id}" class="border border-gray-800 bg-gray-950/50 p-3 rounded-xl cursor-pointer text-center hover:border-indigo-500 transition">
                            <div class="text-sm font-bold text-white">${m.name}</div>
                            <div class="text-[10px] text-gray-500">${m.type}</div>
                        </div>
                    `;
                });
            }
        }

        function selectMethod(id) {
            selectedMethod = id;
            document.querySelectorAll('#methods-container > div').forEach(el => el.classList.remove('border-indigo-500', 'bg-indigo-600/10'));
            document.getElementById(`card-${id}`).classList.add('border-indigo-500', 'bg-indigo-600/10');
        }

        document.getElementById('checkout-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(!selectedMethod) return alert('Pilih metode pembayaran dulu bos!');

            const phone = document.getElementById('user-phone').value;
            const amount = document.getElementById('pay-amount').value;
            const invId = 'INV-' + Math.floor(1000 + Math.random() * 9000);

            // Simpan transaksi langsung ke Supabase
            const { error } = await _supabase.from('transactions').insert([
                { id: invId, phone_number: phone, amount: parseInt(amount), method: selectedMethod, status: 'PENDING' }
            ]);

            if(!error) {
                window.location.href = `/invoice.html?id=${invId}`;
            } else {
                alert('Gagal membuat invoice: ' + error.message);
            }
        });
    </script>
</body>
</html>
