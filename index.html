<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Z-PAY / Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #090d16; color: #fff; }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.07); }
        .active-glow { box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); border-color: #6366f1 !important; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 bg-[radial-gradient(ellipse_at_bottom,_var(--tw-gradient-stops))] from-slate-900 via-purple-950/20 to-black">

    <div class="w-full max-w-lg flex justify-between items-center mb-6 px-2">
        <div class="flex items-center gap-2">
            <div class="w-3 h-3 rounded-full bg-indigo-500 animate-pulse"></div>
            <h1 class="text-xl font-extrabold tracking-wider bg-gradient-to-r from-indigo-400 to-cyan-400 bg-clip-text text-transparent">Z-PAY⚡</h1>
        </div>
        <a href="admin.html" class="text-xs bg-slate-900/80 hover:bg-slate-800 text-slate-400 px-4 py-2 rounded-full border border-slate-800 transition flex items-center gap-2">
            <i class="fas fa-lock text-indigo-400"></i> Admin Panel
        </a>
    </div>

    <div class="w-full max-w-lg glass-card rounded-3xl p-6 shadow-2xl relative overflow-hidden">
        
        <div class="mb-6">
            <h2 class="text-xl font-extrabold text-white">Instant Payment</h2>
            <p class="text-xs text-slate-400 mt-1">Pilih salah satu metode pembayaran di bawah untuk transaksi cepat</p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <button id="btn-qris" onclick="selectPayment('qris')" class="p-4 rounded-2xl bg-slate-900/50 border border-slate-800 hover:border-slate-700 transition-all flex flex-col items-center justify-center text-center group">
                <i class="fas fa-qrcode text-2xl text-cyan-400 group-hover:scale-110 transition-transform mb-2"></i>
                <span class="font-bold text-sm tracking-wide">QRIS AUTOMATIC</span>
            </button>
            <button id="btn-dana" onclick="selectPayment('dana')" class="p-4 rounded-2xl bg-slate-900/50 border border-slate-800 hover:border-slate-700 transition-all flex flex-col items-center justify-center text-center group">
                <i class="fas fa-wallet text-2xl text-blue-400 group-hover:scale-110 transition-transform mb-2"></i>
                <span class="font-bold text-sm tracking-wide">DANA</span>
            </button>
            <button id="btn-gopay" onclick="selectPayment('gopay')" class="p-4 rounded-2xl bg-slate-900/50 border border-slate-800 hover:border-slate-700 transition-all flex flex-col items-center justify-center text-center group">
                <i class="fas fa-coins text-2xl text-emerald-400 group-hover:scale-110 transition-transform mb-2"></i>
                <span class="font-bold text-sm tracking-wide">GOPAY</span>
            </button>
            <button id="btn-seabank" onclick="selectPayment('seabank')" class="p-4 rounded-2xl bg-slate-900/50 border border-slate-800 hover:border-slate-700 transition-all flex flex-col items-center justify-center text-center group">
                <i class="fas fa-university text-2xl text-orange-400 group-hover:scale-110 transition-transform mb-2"></i>
                <span class="font-bold text-sm tracking-wide">TEPI LAUT</span>
            </button>
        </div>

        <div id="detail-box" class="hidden bg-slate-950/90 border border-indigo-950/50 rounded-2xl p-5 text-center">
            <h3 id="display-title" class="font-extrabold text-base tracking-widest mb-4 text-indigo-400"></h3>
            
            <div id="area-qris" class="hidden flex flex-col items-center justify-center">
                <div onclick="openZoom()" class="p-2 bg-white rounded-2xl mb-2 shadow-lg cursor-zoom-in hover:opacity-90 transition relative group max-w-[240px]">
                    <img id="img-qris" src="" alt="QRIS Admin" class="w-full h-auto max-h-[240px] object-contain rounded-xl">
                    <div class="absolute inset-0 bg-black/40 rounded-2xl opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity">
                        <span class="text-xs font-bold text-white"><i class="fas fa-search-plus mr-1"></i> Klik Perbesar</span>
                    </div>
                </div>
                <p class="text-[11px] text-indigo-400 animate-pulse mb-3">💡 Ketuk gambar QRIS untuk memperbesar</p>
            </div>

            <div id="area-transfer" class="hidden flex flex-col items-center justify-center">
                <p class="text-xs text-slate-400 mb-2">Salin Nomor Rekening/Tujuan:</p>
                <div class="flex items-center justify-between bg-slate-900 border border-slate-800 px-4 py-3 rounded-xl w-full">
                    <span id="display-number" class="font-mono font-bold tracking-widest text-lg text-emerald-400"></span>
                    <button onclick="copyText()" class="text-indigo-400 hover:text-indigo-300 ml-2 px-2 py-1 bg-indigo-950/40 rounded-lg text-xs border border-indigo-900/50"><i class="far fa-copy mr-1"></i> Copy</button>
                </div>
            </div>

            <div class="border-t border-slate-900 pt-5 mt-5">
                <p class="text-xs text-slate-400 mb-3 font-semibold">Sudah Selesai Transfer? Hubungi Admin:</p>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="confirmTransaction('whatsapp')" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 px-4 rounded-xl text-xs transition-all flex items-center justify-center gap-2 shadow-lg shadow-emerald-600/10">
                        <i class="fab fa-whatsapp text-sm"></i> WhatsApp Admin
                    </button>
                    <button onclick="confirmTransaction('telegram')" class="bg-sky-600 hover:bg-sky-500 text-white font-bold py-3 px-4 rounded-xl text-xs transition-all flex items-center justify-center gap-2 shadow-lg shadow-sky-600/10">
                        <i class="fab fa-telegram-plane text-sm"></i> Telegram Admin
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="zoom-modal" onclick="closeZoom()" class="fixed inset-0 bg-black/90 z-50 hidden flex flex-col items-center justify-center p-4 cursor-zoom-out animate-fade-in">
        <div class="absolute top-4 right-4 text-white text-xl bg-slate-900/80 w-10 h-10 rounded-full
