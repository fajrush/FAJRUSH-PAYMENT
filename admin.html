<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚙️ Panel Kontrol Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0c101b; color: #fff; }
        .glass-panel { background: rgba(22, 30, 49, 0.9); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="login-section" class="w-full max-w-sm glass-panel rounded-3xl p-6 shadow-2xl">
        <div class="text-center mb-6">
            <i class="fas fa-user-shield text-3xl text-indigo-500 mb-2"></i>
            <h2 class="text-xl font-extrabold text-white">LOGIN ADMIN</h2>
            <p class="text-xs text-slate-400">Ubah info rekening & QRIS</p>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="text-xs text-slate-400 block mb-1">Password Rahasia</label>
                <input type="password" id="pass-admin" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-indigo-500" placeholder="Ketik password admin...">
            </div>
            <button onclick="handleLogin()" class="w-full bg-indigo-600 hover:bg-indigo-500 font-bold py-3 rounded-xl transition shadow-lg shadow-indigo-600/30">Masuk Dashboard</button>
            <p id="err-msg" class="text-xs text-red-400 text-center hidden">❌ Password Salah, Bro!</p>
        </div>
    </div>

    <div id="panel-section" class="w-full max-w-md glass-panel rounded-3xl p-6 shadow-2xl hidden">
        <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4">
            <div>
                <h2 class="text-lg font-bold text-emerald-400"><i class="fas fa-tools mr-1"></i> SETTING REKENING</h2>
                <p class="text-[11px] text-slate-400">Data di bawah langsung mengubah halaman depan pembeli</p>
            </div>
            <button onclick="handleLogout()" class="text-xs bg-red-950 text-red-400 border border-red-900 px-3 py-1.5 rounded-xl hover:bg-red-900 transition">Keluar</button>
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-xs font-semibold text-slate-300 block mb-1">Link/URL Gambar QRIS</label>
                <input type="text" id="cfg-qris" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-indigo-500">
                <span class="text-[10px] text-slate-500 mt-1 block">*Upload fotomu di web postimages.org atau imgur, lalu paste link gambarnya disini.</span>
            </div>

            <div>
                <label class="text-xs font-semibold text-slate-300 block mb-1">Nomor Akun DANA</label>
                <input type="text" id="cfg-dana" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-indigo-500">
            </div>

            <div>
                <label class="text-xs font-semibold text-slate-300 block mb-1">Nomor Akun GOPAY</label>
                <input type="text" id="cfg-gopay" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-indigo-500">
            </div>

            <div>
                <label class="text-xs font-semibold text-slate-300 block mb-1">Nomor Rekening SEABANK</label>
                <input type="text" id="cfg-seabank" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2.5 text-sm text-slate-200 focus:outline-none focus:border-indigo-500">
            </div>

            <button onclick="saveNewConfig()" class="w-full bg-emerald-600 hover:bg-emerald-500 font-bold py-3 rounded-xl transition shadow-lg shadow-emerald-600/20 mt-4 text-sm"><i class="fas fa-save mr-1"></i> Simpan & Update Rekening</button>
        </div>
    </div>

    <script>
        // Password default masuk admin adalah: admin123 (Bisa kamu ganti sesukamu disini)
        const PASSWORD_KUNCI = "admin123";

        function handleLogin() {
            const inputPass = document.getElementById('pass-admin').value;
            if(inputPass === PASSWORD_KUNCI) {
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('panel-section').classList.remove('hidden');
                loadInputFields();
            } else {
                document.getElementById('err-msg').classList.remove('hidden');
            }
        }

        function loadInputFields() {
            document.getElementById('cfg-qris').value = localStorage.getItem('cfg_qris') || "https://placehold.co/200x200/png?text=QRIS+READY";
            document.getElementById('cfg-dana').value = localStorage.getItem('cfg_dana') || "0812-3456-7890";
            document.getElementById('cfg-gopay').value = localStorage.getItem('cfg_gopay') || "0812-8888-9999";
            document.getElementById('cfg-seabank').value = localStorage.getItem('cfg_seabank') || "901-222-333-444";
        }

        function saveNewConfig() {
            localStorage.setItem('cfg_qris', document.getElementById('cfg-qris').value);
            localStorage.setItem('cfg_dana', document.getElementById('cfg-dana').value);
            localStorage.setItem('cfg_gopay', document.getElementById('cfg-gopay').value);
            localStorage.setItem('cfg_seabank', document.getElementById('cfg-seabank').value);
            
            alert('Mantap bro! Rekening berhasil diupdate. Coba cek Halaman Utama sekarang. 🔥');
        }

        function handleLogout() {
            document.getElementById('pass-admin').value = '';
            document.getElementById('login-section').classList.remove('hidden');
            document.getElementById('panel-section').classList.add('hidden');
            document.getElementById('err-msg').classList.add('hidden');
        }
    </script>
</body>
</html>
