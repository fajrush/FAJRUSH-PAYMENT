<div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl h-fit mt-6">
    <h2 class="text-lg font-bold text-white mb-4"><i class="fa-solid fa-share-from-square text-emerald-400 mr-2"></i> Pengalihan Setelah Bayar</h2>
    <form id="social-form" class="space-y-4">
        <div>
            <label class="block text-xs font-semibold text-gray-400 mb-1">Platform Aktif Tujuan</label>
            <select id="active-platform" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500">
                <option value="whatsapp">WhatsApp</option>
                <option value="telegram">Telegram</option>
            </select>
        </div>
        
        <div id="group-wa" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1">Nomor WhatsApp Admin (Format: 628xxx)</label>
                <input type="text" id="wa-number" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1">Template Pesan Otomatis</label>
                <textarea id="wa-message" rows="2" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500"></textarea>
            </div>
        </div>

        <div id="group-tele" class="space-y-4 hidden">
            <div>
                <label class="block text-xs font-semibold text-gray-400 mb-1">Username Telegram Admin (Tanpa @)</label>
                <input type="text" id="tele-username" class="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500">
            </div>
        </div>

        <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-semibold tracking-wide transition shadow-lg shadow-emerald-600/20">Simpan Pengalihan</button>
    </form>
</div>

<script>
    // Tambahkan logika script ini di dalam block <script> admin.html kamu

    const platformSelect = document.getElementById('active-platform');
    const groupWa = document.getElementById('group-wa');
    const groupTele = document.getElementById('group-tele');

    // Toggle tampilan form berdasarkan pilihan platform
    platformSelect.addEventListener('change', () => {
        if (platformSelect.value === 'whatsapp') {
            groupWa.classList.remove('hidden');
            groupTele.classList.add('hidden');
        } else {
            groupWa.classList.add('hidden');
            groupTele.classList.remove('hidden');
        }
    });

    // Load settingan sosmed saat halaman dibuka
    async function loadSocialSettings() {
        const res = await fetch('/api/admin-socials');
        const data = await res.json();
        
        platformSelect.value = data.active_platform;
        document.getElementById('wa-number').value = data.whatsapp_number;
        document.getElementById('wa-message').value = data.whatsapp_message;
        document.getElementById('tele-username').value = data.telegram_username;
        
        // Trigger event change untuk menyembunyikan/menampilkan form yang sesuai
        platformSelect.dispatchEvent(new Event('change'));
    }
    
    // Panggil fungsi load saat dom siap
    document.addEventListener('DOMContentLoaded', () => {
        loadPaymentMethods();
        loadSocialSettings(); // panggil fungsi baru ini
    });

    // Handle submit form sosmed
    document.getElementById('social-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = {
            active_platform: platformSelect.value,
            whatsapp_number: document.getElementById('wa-number').value,
            whatsapp_message: document.getElementById('wa-message').value,
            telegram_username: document.getElementById('tele-username').value
        };

        const res = await fetch('/api/admin-socials/save', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const result = await res.json();
        if(result.success) {
            alert(result.message);
        }
    });
</script>
