<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛠️ Admin Panel / PAY.Z</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0b0f19; color: #fff; }
        .glass { background: rgba(22, 30, 49, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="login-card" class="w-full max-w-sm glass rounded-3xl p-6 shadow-xl">
        <h2 class="text-xl font-extrabold mb-2 text-center text-indigo-400">ADMIN LOGIN</h2>
        <p class="text-xs text-slate-400 text-center mb-6">Akses kontrol pembayaran</p>
        
        <div class="space-y-4">
            <div>
                <label class="text-xs text-slate-400 block mb-1">Password</label>
                <input type="password" id="admin-pass" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500" placeholder="Masukkan password admin...">
            </div>
            <button onclick="checkLogin()" class="w-full bg-indigo-600 hover:bg-indigo-500 font-bold py-2.5 rounded-xl transition shadow-lg shadow-indigo-600/20">Masuk Panel</button>
        </div>
        <p id="login-err" class="text-xs text-red-400 text-center mt-3 hidden">Password Salah brad! ❌</p>
    </div>

    <div id="admin-panel" class="w-full max-w-md glass rounded-3xl p-6 shadow-xl hidden">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-400">🔧 CONFIG PANEL</h2>
                <p class="text-xs text-slate-400">Atur info pembayaran tokomu di sini</p>
            </div>
            <button onclick="logout()" class="text-xs bg-red-900/50 text-red-300 border border-red-800 px-3 py-1.5 rounded-xl hover:bg-red-900">Keluar</button>
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-xs font-semibold text-slate-300 block mb-1">URL Gambar QRIS</label>
                <input type="text" id="input-qris" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2 text-sm text-slate-300 focus:outline-none focus:border-emerald-500">
                <span class="text-[10px] text-slate-500 block mt-1">*Masukkan link gambar qris (bisa upload dulu di postimages.org / imgur)</span>
            </div>

            <div>
                <label class="text-xs font-semibold text-slate-300 block mb-1">Nomor DANA</label>
                <input type="text" id="input-dana" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2 text-sm text-slate-300 focus:outline-none focus:border-emerald-500">
            </div>

            <div>
                <label class="text-xs font-semibold text-slate-300 block mb-1">Nomor GOPAY</label>
                <input type="text" id="input-gopay" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2 text-sm text-slate-300 focus:outline-none focus:border-emerald-500">
            </div>

            <div>
                <label class="text-xs font-semibold text-slate-300 block mb-1">No Rekening SEABANK</label>
                <input type="text" id="input-seabank" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-2 text-sm text-slate-300 focus:outline-none focus:border-emerald-500">
            </div>

            <button onclick="saveChanges()" class="w-full bg-emerald-600 hover:bg-emerald-500 font-bold py-3 rounded-xl transition shadow-lg shadow-emerald-600/20 mt-2">✨ Simpan Perubahan</button>
        </div>
    </div>

    <script>
        // Password default admin
        const ADMIN_PASSWORD = "admin123"; 

        function checkLogin() {
            const pass = document.getElementById('admin-pass').value;
            if (pass === ADMIN_PASSWORD) {
                document.getElementById('login-card').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
                loadCurrentData();
            } else {
                document.getElementById('login-err').classList.remove('hidden');
            }
        }

        function loadCurrentData() {
            document.getElementById('input-qris').value = localStorage.getItem('qris_url') || "https://placehold.co/200x200/png?text=QRIS+Z";
            document.getElementById('input-dana').value = localStorage.getItem('dana_num') || "0812-3456-7890";
            document.getElementById('input-gopay').value = localStorage.getItem('gopay_num') || "0812-3456-7890";
            document.getElementById('input-seabank').value = localStorage.getItem('seabank_num') || "9012-3456-789";
        }

        function saveChanges() {
            localStorage.setItem('qris_url', document.getElementById('input-qris').value);
            localStorage.setItem('dana_num', document.getElementById('input-dana').value);
            localStorage.setItem('gopay_num', document.getElementById('input-gopay').value);
            localStorage.setItem('seabank_num', document.getElementById('input-seabank').value);
            
            alert('Data sukses diperbarui! Cek halaman utama 🔥');
        }

        function logout() {
            document.getElementById('admin-pass').value = '';
            document.getElementById('login-card').classList.remove('hidden');
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('login-err').classList.add('hidden');
        }
    </script>
</body>
</html>
